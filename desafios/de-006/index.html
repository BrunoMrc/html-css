<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li><span title="Usa a tag <p>">Parágrafo</span></li>
        <li><span title="Usa a tag <h1> até <h6>">Títulos</span></li>
        <li><span title="Usa a tag <img>">Imagens</span></li>
        <li><span title="Usa a tag <abbr>">Abreviações</span></li>
        <li><span title="Usa a tag <code>">Códigos-fonte</span></li>
        <li><span title="Usa a tag <ol>">Lista numeradas</span></li>
        <li><span title="Usa a tag <ul>">Lista com demarcadores</span></li>
</body>
</html>
