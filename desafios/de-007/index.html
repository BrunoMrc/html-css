<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Voçê está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor experiência.</p>
    <picture>
        <source media="(max-width: 500px)" srcset="imagens/foto-500.jpeg" type="image/jpeg">
        <source media="(max-width: 600px)" srcset="imagens/foto-600.jpeg" type="image/jpeg">
        <source media="(max-width: 700px)" srcset="imagens/foto-700.jpeg" type="image/jpeg">
        <source media="(max-width: 800px)" srcset="imagens/foto-800.jpeg" type="image/jpeg">
        <source media="(max-width: 900px)" srcset="imagens/foto-900.jpeg" type="image/jpeg">
        <source media="(max-width: 1000px)" srcset="imagens/foto-1000.jpeg" type="image/jpeg">
        <img src="imagens/foto-1000.jpeg" alt="foto flexível">
    </picture>
</body>
</html>
