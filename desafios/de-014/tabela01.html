<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>

        body
        {
            font-family: Arial, sans-serif;
        }

        table
        {
            border-collapse: collapse;
            width: 50%;
            
        }

        thead
        {
            background-color: gray;
            color: white;
        }
        
        .media
        {
            background-color: gray;
            font-weight: bold;
            text-align: left;
            color: white;
        }
        .numero
        {
            background-color: gray;
            font-weight: bold;
            color: white;
        }
        th, td
        {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Área</th>
                <th rowspan="2">Disciplina</th>
                <th colspan="2" scope="colgroup">Notas</th> 
                <th rowspan="2">Média</th>
            </tr>
            <tr>
                <th>Nota 1</th>
                <th>Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td>8,5</td>
                <td>9,0</td>
                <td>8,75</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>7,0</td>
                <td>8,0</td>
                <td>7,5</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>9,0</td>
                <td>8,5</td>
                <td>8,75</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>7,5</td>
                <td>8,0</td>
                <td>7,75</td>
            </tr>
            <tr>
                <th colspan="4" class="media">Médias de Exatas</th>
                <th class="numero">8,25</th>
            </tr>
            <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td>8,0</td>
                <td>8,5</td>
                <td>8,25</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>7,5</td>
                <td>8,0</td>
                <td>7,75</td>
            </tr>
            <tr>
                <th colspan="4" class="media">Médias de Humanas</th>
                <th class="numero">8,0</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
