<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love Story';
            src: url(fontes/love_story_2.zip) format(opentype), url(fontes/love\ story\ ttf.ttf) format(truetype);
            font-weight: normal;
            font-style: normal;

            /*
                Tipos de format():
                - truetype (ttf)
                - opentype (otf)
                - embedded-opentype (eot)
                - truetype-aat (Apple Advanced Typography
                - svg (Scalable Vector Graphics)
            */
        }
        body
        {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1
        {
            font-family: 'Love Story', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis adipisci laborum cumque. Suscipit, fugit cumque ab repellat vero odio animi, doloremque consequuntur deleniti dignissimos ullam possimus ea velit hic optio!</p>
</body>
</html>
