<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
    <style>

        body 
        {
            font-family: Arial, sans-serif;
        }

        table 
        {
            width: 500px;
            border-collapse: collapse;
        }

        caption 
        {
            font-size: 1.3em;
            font-weight: bold;
            padding: 8px;
        }

        th, td 
        {
            border: 1px solid #000;
            padding: 8px;
        }

        .nome 
        {
            background-color: lightgreen;
        }

        .sexo 
        {
            background-color: lightblue;
        }

        .idade 
        {
            background-color: lightcoral;
        }

        .profissao 
        {
            background-color: lightyellow;
        }

    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>

    <table>
        <colgroup>
            <col class="nome">
            <col class="sexo">
            <col class="idade">
            <col class="profissao">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>Feminino</td>
            <td>30</td>
            <td>Engenheira</td>
        </tr>
        <tr>
            <td>João</td>
            <td>Masculino</td>
            <td>25</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Bruna</td>
            <td>Feminino</td>
            <td>28</td>
            <td>Designer</td>
        </tr> 
        <tr>
            <td>Carlos</td>
            <td>Masculino</td>
            <td>35</td>
            <td>Gerente</td>
        </tr>
        <tr>
            <td>Mariana</td>
            <td>Feminino</td>
            <td>22</td>
            <td>Estudante</td>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>Masculino</td>
            <td>40</td>
            <td>Médico</td>
        </tr>  
    </table>
</body>
</html>
